<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Compute Market — Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0b0d0c;
    --panel: #11150f;
    --sunk: #0e120c;
    --border: #232a23;
    --text: #d8e0d6;
    --muted: #7e8a7d;
    --accent: #6fd08a;
    --accent-dim: #2c5a3c;
    --buy: #6fd08a;
    --sell: #e8856b;
    --amber: #e6c46b;
    --radius: 4px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 13px; line-height: 1.5;
    background-image: linear-gradient(transparent 95%, rgba(111,208,138,0.03) 95%);
    background-size: 100% 28px;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--bg); z-index: 5;
  }
  header h1 { font-size: 14px; font-weight: 700; margin: 0; letter-spacing: 0.04em; }
  header h1 span { color: var(--accent); }
  .status { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 12px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .dot.ok { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .dot.down { background: var(--sell); }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 20px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(310px, 1fr)); gap: 14px; }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .panel h2 {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--muted); margin: 0 0 12px; padding-bottom: 8px; border-bottom: 1px dashed var(--border);
  }
  .panel h2 b { color: var(--accent); margin-right: 6px; }
  label { display: block; color: var(--muted); font-size: 11px; margin: 8px 0 3px; }
  input, select {
    width: 100%; background: var(--sunk); border: 1px solid var(--border); color: var(--text);
    font-family: inherit; font-size: 12px; padding: 7px 8px; border-radius: var(--radius); outline: none;
  }
  input:focus, select:focus { border-color: var(--accent-dim); }
  .row { display: flex; gap: 8px; }
  .row > * { flex: 1; }
  .check { display: flex; align-items: center; gap: 7px; margin: 10px 0 0; color: var(--muted); }
  .check input { width: auto; }
  button {
    width: 100%; margin-top: 12px; background: transparent; border: 1px solid var(--accent-dim);
    color: var(--accent); font-family: inherit; font-size: 12px; font-weight: 500; letter-spacing: 0.04em;
    padding: 8px; border-radius: var(--radius); cursor: pointer; transition: background 0.12s, border-color 0.12s;
  }
  button:hover { background: rgba(111,208,138,0.08); border-color: var(--accent); }
  button.sell { border-color: #5e3329; color: var(--sell); }
  button.sell:hover { background: rgba(232,133,107,0.08); border-color: var(--sell); }
  .hint { color: var(--muted); font-size: 11px; margin-top: 8px; }
  .pill { display: inline-block; background: var(--sunk); border: 1px solid var(--border); border-radius: 3px;
          padding: 1px 6px; color: var(--accent); font-size: 11px; cursor: pointer; }
  /* order book */
  .book { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .book-side div { display: flex; justify-content: space-between; padding: 2px 6px; border-radius: 2px; }
  .book-side .hd { color: var(--muted); border-bottom: 1px solid var(--border); margin-bottom: 4px; padding-bottom: 4px; }
  .ask { color: var(--sell); } .ask:nth-child(even) { background: rgba(232,133,107,0.05); }
  .bid { color: var(--buy); } .bid:nth-child(even) { background: rgba(111,208,138,0.05); }
  /* balances */
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  td { padding: 3px 6px; border-bottom: 1px solid var(--border); }
  td:last-child { text-align: right; color: var(--accent); }
  .bal-sec { color: var(--muted); font-size: 11px; margin: 10px 0 4px; text-transform: uppercase; letter-spacing: 0.1em; }
  /* log */
  .log { background: var(--sunk); border: 1px solid var(--border); border-radius: var(--radius);
         padding: 12px; height: 230px; overflow-y: auto; font-size: 12px; }
  .log .line { padding: 2px 0; border-bottom: 1px solid rgba(35,42,35,0.5); white-space: pre-wrap; word-break: break-word; }
  .log .t { color: var(--muted); }
  .log .ok { color: var(--accent); } .log .err { color: var(--sell); } .log .info { color: var(--amber); }
  .full { grid-column: 1 / -1; }
  ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>
<header>
  <h1>COMPUTE<span>/</span>MARKET <span style="color:var(--muted);font-weight:400">terminal</span></h1>
  <div class="status"><span id="apilabel">api: same-origin</span><span class="dot" id="dot"></span><span id="health">connecting…</span></div>
</header>

<div class="wrap">
  <div class="grid">

    <div class="panel">
      <h2><b>1</b> Provider &amp; mint</h2>
      <label>provider label</label>
      <input id="p_label" placeholder="Acme GPU" value="Acme GPU" />
      <button onclick="createProvider()">register provider</button>
      <div class="hint">last: <span class="pill" id="p_id" onclick="copyId('p_id')">—</span></div>
      <label>provider id</label>
      <input id="m_provider" placeholder="acct_…" />
      <div class="row">
        <div><label>sku</label><select id="m_sku"></select></div>
        <div><label>qty</label><input id="m_qty" type="number" value="100" /></div>
      </div>
      <button onclick="mint()">mint capacity</button>
    </div>

    <div class="panel">
      <h2><b>2</b> Accounts &amp; funding</h2>
      <label>account label</label>
      <input id="a_label" placeholder="AI Lab" value="AI Lab" />
      <label class="check"><input type="checkbox" id="a_purch" checked /> register as purchaser</label>
      <button onclick="createAccount()">register account</button>
      <div class="hint">last: <span class="pill" id="a_id" onclick="copyId('a_id')">—</span></div>
      <label>account id</label>
      <input id="d_acct" placeholder="acct_…" />
      <label>deposit amount (<span class="qc">USDC</span>)</label>
      <input id="d_amt" type="number" value="1000" />
      <button onclick="deposit()">deposit</button>
    </div>

    <div class="panel">
      <h2><b>3</b> Place order</h2>
      <label>account id</label>
      <input id="o_acct" placeholder="acct_…" />
      <div class="row">
        <div><label>sku</label><select id="o_sku"></select></div>
        <div><label>qty</label><input id="o_qty" type="number" value="20" /></div>
        <div><label>price</label><input id="o_price" type="number" step="0.01" value="2.50" /></div>
      </div>
      <div class="row">
        <button onclick="placeOrder('buy')">buy</button>
        <button class="sell" onclick="placeOrder('sell')">sell</button>
      </div>
    </div>

    <div class="panel">
      <h2><b>4</b> Order book</h2>
      <div class="row">
        <div><label>sku</label><select id="b_sku" onchange="refreshBook()"></select></div>
        <div style="flex:0 0 auto;display:flex;align-items:flex-end">
          <label class="check" style="margin:0"><input type="checkbox" id="b_auto" checked onchange="toggleAuto()" /> auto</label>
        </div>
      </div>
      <div class="book" style="margin-top:12px">
        <div class="book-side"><div class="hd"><span>bid px</span><span>qty</span></div><div id="bids"></div></div>
        <div class="book-side"><div class="hd"><span>ask px</span><span>qty</span></div><div id="asks"></div></div>
      </div>
      <button onclick="refreshBook()">refresh</button>
    </div>

    <div class="panel">
      <h2><b>5</b> Balances</h2>
      <label>account id</label>
      <input id="bal_acct" placeholder="acct_…" />
      <button onclick="refreshBalances()">look up</button>
      <div id="bal_out" style="margin-top:10px"></div>
    </div>

    <div class="panel">
      <h2><b>6</b> Redeem &amp; settle</h2>
      <label>account id</label>
      <input id="r_acct" placeholder="acct_…" />
      <div class="row">
        <div><label>sku</label><select id="r_sku"></select></div>
        <div><label>qty</label><input id="r_qty" type="number" value="5" /></div>
      </div>
      <button onclick="redeem()">redeem for delivery</button>
      <label style="margin-top:14px">withdraw amount (<span class="qc">USDC</span>)</label>
      <input id="w_amt" type="number" value="50" />
      <button onclick="withdraw()">settle out to wallet</button>
    </div>

    <div class="panel full">
      <h2><b>·</b> Activity &amp; tape</h2>
      <div class="log" id="log"></div>
    </div>

  </div>
</div>

<script>
  const API = ""; // same origin (served by FastAPI at /). Set to e.g. "http://127.0.0.1:8000" if hosting the page elsewhere.
  const $ = (id) => document.getElementById(id);

  function ts() { return new Date().toLocaleTimeString(); }
  function log(msg, cls = "") {
    const el = $("log");
    const line = document.createElement("div");
    line.className = "line";
    line.innerHTML = `<span class="t">${ts()}</span>  <span class="${cls}">${msg}</span>`;
    el.prepend(line);
  }
  function copyId(id) {
    const v = $(id).textContent;
    if (v && v !== "—") { navigator.clipboard?.writeText(v); log(`copied ${v}`, "info"); }
  }

  async function api(path, method = "GET", body = null) {
    const opts = { method, headers: { "content-type": "application/json" } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(API + path, opts);
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.detail || `${res.status} ${res.statusText}`);
    return data;
  }

  async function loadSkus() {
    let skus = [{ sku: "H100-HOUR" }, { sku: "A100-HOUR" }, { sku: "B200-HOUR" }];
    try { skus = await api("/skus"); } catch (e) {}
    for (const sel of ["m_sku", "o_sku", "b_sku", "r_sku"]) {
      $(sel).innerHTML = skus.map((s) => `<option value="${s.sku}">${s.sku}</option>`).join("");
    }
  }

  async function health() {
    try {
      const h = await api("/health");
      $("dot").className = "dot ok"; $("health").textContent = `live · v${h.version}`;
      document.querySelectorAll(".qc").forEach((e) => (e.textContent = h.quote_currency));
    } catch (e) {
      $("dot").className = "dot down"; $("health").textContent = "offline — is the server running?";
    }
  }

  async function createProvider() {
    try {
      const p = await api("/providers", "POST", { label: $("p_label").value });
      $("p_id").textContent = p.id; $("m_provider").value = p.id; $("o_acct").value = p.id;
      log(`provider registered → ${p.id} (whitelisted: ${p.provider_whitelisted})`, "ok");
    } catch (e) { log("provider: " + e.message, "err"); }
  }

  async function mint() {
    try {
      const a = await api("/capacity/mint", "POST", {
        provider_id: $("m_provider").value, sku: $("m_sku").value, qty: +$("m_qty").value,
      });
      log(`minted ${$("m_qty").value} ${$("m_sku").value} → ${a.id}`, "ok");
      refreshBook();
    } catch (e) { log("mint: " + e.message, "err"); }
  }

  async function createAccount() {
    try {
      const a = await api("/accounts", "POST", { label: $("a_label").value, purchaser: $("a_purch").checked });
      $("a_id").textContent = a.id;
      $("d_acct").value = a.id; $("o_acct").value = a.id; $("bal_acct").value = a.id; $("r_acct").value = a.id;
      log(`account registered → ${a.id}`, "ok");
    } catch (e) { log("account: " + e.message, "err"); }
  }

  async function deposit() {
    try {
      const a = await api(`/accounts/${$("d_acct").value}/deposit`, "POST", { amount: +$("d_amt").value });
      log(`deposited ${$("d_amt").value} → ${a.id} (free: ${a.quote_free})`, "ok");
    } catch (e) { log("deposit: " + e.message, "err"); }
  }

  async function placeOrder(side) {
    try {
      const r = await api("/orders", "POST", {
        account_id: $("o_acct").value, side, sku: $("o_sku").value,
        qty: +$("o_qty").value, price: +$("o_price").value,
      });
      const fills = r.trades.length;
      log(`${side.toUpperCase()} ${$("o_qty").value} ${$("o_sku").value} @ ${$("o_price").value} → ${r.order.status}, ${fills} fill(s)`, side === "buy" ? "ok" : "info");
      for (const t of r.trades) log(`  ↳ TRADE ${t.qty} ${t.sku} @ ${t.price}  (buyer ${t.buyer_id} ← seller ${t.seller_id})`, "info");
      refreshBook();
    } catch (e) { log(side + ": " + e.message, "err"); }
  }

  async function refreshBook() {
    try {
      const sku = $("b_sku").value;
      const b = await api(`/orderbook/${sku}`);
      $("asks").innerHTML = b.asks.slice().reverse().map((l) => `<div class="ask"><span>${l.price.toFixed(2)}</span><span>${l.qty}</span></div>`).join("") || `<div style="color:var(--muted)">—</div>`;
      $("bids").innerHTML = b.bids.map((l) => `<div class="bid"><span>${l.price.toFixed(2)}</span><span>${l.qty}</span></div>`).join("") || `<div style="color:var(--muted)">—</div>`;
    } catch (e) {}
  }

  async function refreshBalances() {
    try {
      const a = await api(`/accounts/${$("bal_acct").value}`);
      const cap = (obj) => Object.entries(obj).filter(([, v]) => v > 0).map(([k, v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join("") || `<tr><td colspan="2" style="color:var(--muted)">none</td></tr>`;
      $("bal_out").innerHTML = `
        <div class="bal-sec">quote (${a.quote_free + a.quote_locked === 0 ? "USDC" : "USDC"})</div>
        <table><tr><td>free</td><td>${a.quote_free}</td></tr><tr><td>locked (in bids)</td><td>${a.quote_locked}</td></tr></table>
        <div class="bal-sec">capacity — free</div><table>${cap(a.capacity_free)}</table>
        <div class="bal-sec">capacity — locked (in asks)</div><table>${cap(a.capacity_locked)}</table>`;
    } catch (e) { log("balances: " + e.message, "err"); }
  }

  async function redeem() {
    try {
      const r = await api("/capacity/redeem", "POST", { account_id: $("r_acct").value, sku: $("r_sku").value, qty: +$("r_qty").value });
      log(`redeemed ${r.qty} ${r.sku} → ${r.status} (${r.id})`, "ok");
      refreshBalances();
    } catch (e) { log("redeem: " + e.message, "err"); }
  }

  async function withdraw() {
    try {
      const p = await api(`/accounts/${$("r_acct").value}/withdraw`, "POST", { amount: +$("w_amt").value });
      log(`settled ${p.amount} out → ${p.destination} (${p.status})`, "ok");
      refreshBalances();
    } catch (e) { log("withdraw: " + e.message, "err"); }
  }

  let autoTimer = null;
  function toggleAuto() { $("b_auto").checked ? (autoTimer = setInterval(refreshBook, 2000)) : clearInterval(autoTimer); }

  // boot
  (async () => {
    await health(); await loadSkus(); refreshBook(); toggleAuto();
    log("terminal ready — register a provider (1), mint, then trade (3). full API at /docs", "info");
    setInterval(health, 10000);
  })();
</script>
</body>
</html>
